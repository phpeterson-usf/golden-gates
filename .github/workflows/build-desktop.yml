name: Build Desktop App

on:
  push:
    branches: [ main ]
    paths:
      - 'web/**'                              # app code, deps, or the ggl-engine submodule pointer
      - '.github/workflows/build-desktop.yml'
  workflow_dispatch: {}                       # allow manual runs from the Actions tab

concurrency:
  group: build-desktop
  cancel-in-progress: true                    # a newer push supersedes an in-flight build

permissions:
  contents: write                             # the release job publishes to GitHub Releases

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest      # Apple Silicon runner -> arm64
            platform: mac
          - os: windows-latest    # x64 runner
            platform: win
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          # The build needs the ggl engine (vite copies ggl-engine/src/ggl).
          submodules: recursive

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        working-directory: web
        run: npm ci

      - name: Generate Windows app icon
        working-directory: web
        run: npm run icon

      - name: Build web app (vite)
        working-directory: web
        run: npm run build

      - name: Package Electron app
        working-directory: web
        env:
          # macOS: skip Developer ID discovery; the afterPack hook ad-hoc signs
          # the app so it runs on Apple Silicon (not notarized — see README).
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
          # Windows: electron-builder signs automatically when these are set.
          # Until the WIN_CSC_* repo secrets exist they resolve to empty and the
          # Windows build stays unsigned. See README "Code signing".
          WIN_CSC_LINK: ${{ secrets.WIN_CSC_LINK }}
          WIN_CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}
          # Build number -> 4th component of the Windows file version and the
          # macOS CFBundleVersion (artifact filenames keep the package.json
          # semver). Monotonic per workflow run.
          BUILD_NUMBER: ${{ github.run_number }}
        run: npx electron-builder --${{ matrix.platform }} --publish never

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: golden-gates-${{ matrix.platform }}
          path: |
            web/release/*.dmg
            web/release/*.zip
            web/release/*.exe
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Publish rolling 'latest' prerelease
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          mapfile -t files < <(find artifacts -type f \( -name '*.dmg' -o -name '*.zip' -o -name '*.exe' \) | sort)
          if [ "${#files[@]}" -eq 0 ]; then
            echo "No build artifacts found to release" >&2
            exit 1
          fi
          printf 'Releasing asset: %s\n' "${files[@]}"
          # Recreate the release so 'latest' always points at the most recent
          # build of main while keeping stable download URLs (tag + filenames).
          gh release delete latest --repo "$REPO" --cleanup-tag --yes || true
          gh release create latest "${files[@]}" \
            --repo "$REPO" \
            --target "$SHA" \
            --prerelease \
            --title "Latest build" \
            --notes "Automated build from \`main\` (${SHA}). These builds are ad-hoc signed (macOS) / unsigned (Windows) — see the README for how to open them."
