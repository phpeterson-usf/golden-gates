name: Nightly Build

on:
  schedule:
    - cron: '0 8 * * *'   # 08:00 UTC daily (~midnight/1am US Pacific)
  workflow_dispatch: {}     # allow manual runs from the Actions tab

concurrency:
  group: nightly-build
  cancel-in-progress: true

permissions:
  contents: write           # the release job publishes to GitHub Releases

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest      # Apple Silicon runner -> arm64
            platform: mac
          - os: windows-latest    # x64 runner
            platform: win
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          # The build needs the ggl engine (vite copies ggl-engine/src/ggl).
          submodules: recursive

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        working-directory: web
        run: npm ci

      - name: Generate Windows app icon
        working-directory: web
        run: npm run icon

      - name: Build web app (vite)
        working-directory: web
        run: npm run build

      - name: Package Electron app
        working-directory: web
        env:
          # Don't attempt macOS code signing/notarization (no certs in CI);
          # nightly builds ship unsigned.
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
        run: npx electron-builder --${{ matrix.platform }} --publish never

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: golden-gates-${{ matrix.platform }}
          path: |
            web/release/*.dmg
            web/release/*.zip
            web/release/*.exe
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Publish rolling 'nightly' prerelease
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          mapfile -t files < <(find artifacts -type f \( -name '*.dmg' -o -name '*.zip' -o -name '*.exe' \) | sort)
          if [ "${#files[@]}" -eq 0 ]; then
            echo "No build artifacts found to release" >&2
            exit 1
          fi
          printf 'Releasing asset: %s\n' "${files[@]}"
          # Recreate the release so 'nightly' always points at the latest build
          # while keeping stable download URLs (tag + artifactName are fixed).
          gh release delete nightly --repo "$REPO" --cleanup-tag --yes || true
          gh release create nightly "${files[@]}" \
            --repo "$REPO" \
            --target "$SHA" \
            --prerelease \
            --title "Nightly Build" \
            --notes "Automated nightly build from \`main\` (${SHA}). These builds are **unsigned** — see the README for how to open them on macOS and Windows."
