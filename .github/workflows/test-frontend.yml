name: Frontend Tests

on:
  push:
    branches: [ main ]
    paths:
      - 'web/**'
      - '.github/workflows/test-frontend.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'web/**'
      - '.github/workflows/test-frontend.yml'

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v5
      with:
        # Pull in the ggl engine, which lives in the web/ggl-engine submodule
        # and is needed by the build (vite copies ggl-engine/src/ggl -> /ggl).
        submodules: recursive

    - name: Setup Node.js
      uses: actions/setup-node@v5
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: web/package-lock.json
        
    - name: Install dependencies
      working-directory: web
      run: npm ci
      
    - name: Run tests with coverage
      working-directory: web
      run: npm run test:coverage
      
    - name: Build project
      working-directory: web
      run: npm run build
      
    - name: Upload test results
      uses: actions/upload-artifact@v5
      if: always()
      with:
        name: test-results
        path: web/coverage/
        retention-days: 30